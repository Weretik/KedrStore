name: Deploy to Cloud Run

on:
  push:
    branches: [ "master" ]

permissions:
  contents: read
  id-token: write

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build & Push Host.Api image
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/api/api:${{ github.sha }}"
          docker build -f src/Bootstrapper/Host.Api/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Build & Push Host.Jobs image
        run: |
          JOBS_IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/api/host-jobs:${{ github.sha }}"
          docker build -f src/Bootstrapper/Host.Jobs/Host.Jobs/Dockerfile -t "$JOBS_IMAGE" .
          docker push "$JOBS_IMAGE"
          echo "JOBS_IMAGE=$JOBS_IMAGE" >> $GITHUB_ENV

      - name: Deploy Host.Api to Cloud Run
        run: |
          gcloud run deploy "${{ env.CLOUD_RUN_SERVICE }}" \
            --image "${{ env.IMAGE }}" \
            --region "${{ env.GCP_REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --set-secrets "ConnectionStrings__Default=db-connection:latest,OneCSoap__Endpoint=onec-endpoint:latest,OneCSoap__Username=onec-username:latest,OneCSoap__Password=onec-password:latest,Identity__AdminUser__DefaultPassword=identity-admin-password:latest,Telegram__BotToken=telegram-bot-token:latest,Telegram__ChatId=telegram-chat-id:latest" \
            --quiet

      - name: Update Cloud Run Jobs to new image
        run: |
          for JOB in onec-prices onec-category onec-pricetypes onec-productdetails onec-stocks onec-full; do
            gcloud run jobs update "$JOB" \
              --image "${{ env.JOBS_IMAGE }}" \
              --region "${{ env.GCP_REGION }}" \
              --quiet
          done
